<!DOCTYPE html>
<html>
<head>
    <title>404 - 页面未找到</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            margin: 0;
        }
        .error-message {
            font-size: 24px;
            margin: 20px 0;
        }
        .home-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .home-link:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1 class="error-code">404</h1>
    <p class="error-message">哎呀！页面好像迷路了...</p>
    <p>您访问的页面不存在或已被移动。</p>
    <a href="/" class="home-link">返回首页</a>
    
    <!-- 可选：自动重定向 -->
    <script>
        // 10秒后自动返回首页
        setTimeout(function() {
            window.location.href = '/';
        }, 10000);
        
        // 记录404页面访问（如果需要）
        console.log('404页面被访问：' + window.location.href);
    </script>
</body>
</html>
